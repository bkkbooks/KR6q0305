body:
  text: 目次初住溫州鴈山羅漢禪寺語録臨安府臨平山佛日淨慧禪寺語録慶元府大梅山保福禪寺語録慶元府香山孝慈真應禪寺語録婺州雲黃山寶林禪寺語録平江府承天能仁禪寺語録安吉州拍山崇恩資壽禪寺語録臨安府淨慈報恩光孝禪師語録小參拈古法語偈頌讚佛祖小佛事介石和尚初住溫州鴈山羅漢禪寺語録參學正賢編師於紹定二年二月初三日入院指三門云不立孤危了無藏覆掉臂因行推門入臼佛殿佛身無為不墮諸數土塊泥團燈籠露柱插香云鳳棲不在梧桐樹踞方丈千鈞之弩不為鼷鼠發機推向萬仞懸崖須自放身捨命拍禪床云惜取眉毛指法座步步登高底擡腳不起擡腳不起底步步登高新羅漢又且如何驟步云一二三四五遂升座拈香云此一瓣香恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲皇帝陛下恭願卜年卜世更期周曆之長多壽多男願獻華封之祝次拈香云鐘阜太白凌霄少雪老到洞山之兩度佛手生緣驢腳痛乞兒露窮相之一拳爇向爐中奉為前住徑山興聖萬壽禪寺特賜佛心禪師浙翁大和尚用酬法乳之恩乃就座云太平無象王道無私罷却干戈正好相見僧問龍淵深處頭角崢嶸鴈宕山巔曇花應瑞作麼生是為人底句師云靈龜突出最高峰進云與麼則皇恩佛恩一時報畢師云謝闍黎證明進云三聖道我逢人即出出即不為人是如何師云竭海尋珠進云興化道我逢人即不出出則便為人師云登山捧月進云二大老與麼説話相去多少師云一等春風百樣花進云向上還有事也無師云就中此景難圖録僧斫額云今日親見諾詎羅尊者師云猶隔海在進云爭奈佛手難遮師云禮拜著進云今日小出大遇僧禮拜師乃云靈山付囑黃葉止啼少室安心擔雪填井一錯百錯錯到如今朋上座平時水邊林下不求諸聖不慕己靈又誰管你天又誰管你地無端失腳墮此群隊不免將錯就錯向荊棘林中七縱八橫成此罪業去也拍禪床云一片月生海幾家人上樓舉古德問僧甚處來僧云雪峰來古德云我當時到彼事事不足如今足也未僧云足古德云粥足飯足僧無語師云不貪香餌始是錦鱗不墮網羅方為瑞獸這僧不會藏身帶纍古德重施陷穽要知麼無事自然隨勢去有聲多為不平來小參舉一不得舉二放過一著拈拄杖云諾詎羅尊者來也向萬仞崖頭撒出一派如雷如霆如電如霧如珠如霰如虹如雨百千萬變無有窮盡盡天下人向這裏眼盵瞪地直饒拶透嶮崖截斷源頭與尊者未有相見分在況我衲僧門下猶隔千里萬里卓拄杖云雲行雨施三草二木舉仰山一日忽見異僧乘空而至立於前仰云近離甚處僧云早晨離西天仰云何太遲生僧云遊山玩水仰云神通妙用不無闍黎佛法須還老僧僧云特來東土禮文殊却遇小釋迦遂出西天貝多葉與仰山作禮乘空而去師云盡謂這僧虗空裏來虗空裏去不與截斷腳跟令歸家穩坐返被兩杓惡水殊不知這僧被仰山兩拶便乃奔東走西喚鐘作甕若使盡令而行未有承當分在謝兩班上堂聲前句後全放全收斗換星移半明半暗且圖共樂升平總瞞諸人不得何故入鄉隨俗上堂北單越西瞿耶尼有利無利不離行市拈拄杖云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子靠拄杖云船子下揚州黃金如糞土喝一喝元宵上堂一燈分燈燈無盡一處明處處齊透閙浩浩中一法不捨靜悄悄處一塵不受燈明如來一場漏逗二月半上堂春事正繁黃面老子命根未斷正當此時殺活在諸人手裏眼裏無筋皮下無血底別聽處分竪起拂子云今日則有明日則無上堂靈雲三十年只道得箇不疑未曾識桃花面在玄沙道諦當甚諦常敢保老兄未徹猶是扶醉度橋只如汾陽才聞得不覺笑咍咍又作麼生路入桃源深更深上堂事同一家萬別千差雲門糊餅趙州喫茶擲下拄杖云何似南山鱉鼻蛇上堂舉真淨上堂云頭陀石被莓苔褁擲筆峰遭薜荔纏羅漢寺裏一年度三箇行者歸宗參退喫茶師云如來禪祖師禪則不問且道生薑因甚不改辣上堂未舉先知未言先領趙州無關玄沙有嶺卓拄杖云萬別千差一印定佛生日上堂舉釋迦老子指天指地云天上天下惟我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師云釋迦老子末上作無上無畏大獅子吼分明平地干戈雲門雖盡輸義膽忠肝貴圖太平轉見撥亂乾坤羅漢當時若見即向道低聲低聲且道據箇什麼道理堯舜之君猶有化在上堂五月五日天中節衲僧喝似雷奔棒如雨點孤峰頂上呵罵自如喚什麼作赤口白舌逢佛殺佛逢祖殺祖逢羅漢殺羅漢喚什麼作惡氣邪妖拈拄杖云這一道靈符不從人得正恁麼時還我獅子兒來發洪上堂卒風暴雨鼓蕩無前石裂崖崩回避不及總教喪盡生涯方見時清道泰拈拄杖云功不浪施中秋上堂秋雨凄凄秋雲黯黯竪起拄杖云還見麼修成八萬四千斧不比尋常三五圓九月半上堂日卓午夜半子千門萬戶俱開一聲兩聲砧杵流沙浪闊蔥嶺無路達磨何曾歸去十一月旦上堂大地皆凍鎖遍界熱如火時節不放過衲僧多蹉過不蹉過深雪之中有一箇喝一喝謝監收上堂伶利衲僧動無思算合水和泥田頭地畔搆得完全只得一半既是搆得完全為什麼只得一半窮坑難滿至節上堂楖𣗖木卷而曲回天關轉地軸群陰時時剝盡一陽日日來復為甚羅漢山中冷門難向不是苦心人不知聖節上堂夫説法者當如法説今晨啓建天基聖節林下片心盡忠盡節如法而説見前大衆同此片心諦聽諦聽起身云聖躬萬歲臘八上堂全身坐在正覺山中要行便行要用便用明星現處路頭通十倍慈悲成脫空元正上堂舊歲昨宵去新年今日來燈籠與露柱不覺笑咍咍且道笑箇什麼達磨面壁雲門念七臨安府臨平山佛日淨慧禪寺語録參學編指三門云我此一門全無肯路寶階三道曲為今時喝一喝云退後退後佛殿黃面老子性命今日落在朋上座手裏扶起放倒不為差事踞方丈萬仞崖頭電光影裏便教同死同生更向別峰相見升座祝聖罷問答不録乃云大機大用全提半提把住放行有賓有主總是開張鋪席豁浪門堂自遠趨風先供死欵影沉寒水借地活埋於本參中未有買賣分在聊順時宜分明舉似五月臨平山下路藕花無數滿汀洲舉當山開山佛日和尚在夾山一日普請次維那命佛日送茶日云某甲祇為佛法來不為送茶來那云和尚令請上座日云和尚即得乃將茶去作務處撼茶碗作聲山不顧日云釅茶三五碗意在钁頭邊山云瓶有傾茶勢籃中幾箇甌日云瓶有傾茶勢籃中無一甌便傾茶行時大衆舉目視之日云大衆鶴望乞師一言山云路逢死蛇莫打殺無底籃子盛將歸日云手執夜明符幾箇知天曉山召大衆云有人也歸去來歸去來師云和尚即得钁頭邊事已屬佛日普請有人摘茶翻成不了雖然夾山眼目精明知佛日自雲居來不作王小波草鞋看顧上堂諸佛出世借水獻花祖師西來就模脫墼一大藏教考下文章明眼衲僧扶籬摸壁到箇裏又作麼生但願今年蠶麥熟羅睺羅兒與一文正旦上堂達磨西來卦文不識胡卜亂卜傳至今日佛日等是開箇鋪席敢向朕兆未分已前卓拄杖云端平元年正月一上堂千尺絲綸直下垂一波才動萬波隨拈拄杖云是汝諸人作麼生吞吐靠拄杖云喫粥喫飯有什麼難喝一喝上堂桃花爛熳紅靈雲眼中血不是斷腸人此恨向誰説佛生日上堂胞胎才出播殃塵直至如今毒害人一杓蘭湯無限恨腕頭何止重千斤上堂禁足安居一句直舉匝地普天四月十五上堂一葉落天下秋回避不及底眼睛突出窺無門底南州北州有來由處沒來由十月旦上堂時節若至其理自彰所以水至冬則始氷地至冬則始凍萬物至冬則成實衲僧至冬又且如何近火先焦上堂冬不寒臘後看酸風刮地凍破泥團毗盧樓閣前少林深雪裏誰知猶隔萬重關喝一喝上堂滯貨無價爛錢無索咬定牙關將錯就錯天將以夫子為木鐸喝一喝謝兩班上堂提折腳鐺各出隻手釋迦不先彌勒不後妙用臨機如盤珠走鼓腹笑復歌面南看北斗上堂舉老宿云祖師九年面壁為訪知音若與麼會將來喫鐵棒有日在一老宿云祖師九年面壁何不慚惶若與麼會更置草鞋錢行腳三十年師云二老宿與麼道大似打開祖師門戶截斷來者蹊徑既不與麼畢竟如何達磨面壁佛成道上堂六載將身草裏埋當時有眼幾曾開果然見得明星現未到門庭冷似灰慶元府大梅山保福禪寺語録參學編佛殿坐底坐殺立底立殺不知誰是赤鬚胡轉身句子活鱍鱍拈帖我王庫內無如是刀提起云快便難逢全殺全活維那但與麼拈出升座祝聖罷問答不録乃云從上已來無上妙味為世所珍只如花信風未來已前因甚盡大地人望梅林止渴所以黃梅七百摘葉尋枝碓下三更移窠打垛以至大庾嶺頭枝蔓上重生枝蔓你自非心非佛我自即心即佛無異半弄青黃馬大師道梅子熟也徒勞醞釀龐居士親曾驗過大似口裏膠生還我核子來管取吐不出以拂子擊禪床云今日一齊百雜碎了也便有不受陽和力不假栽培底總是生擘破終不馨香且如何得人境相稱去良久云名從寶鼎調羹得曲入胡笳帶月吹舉當山開山祖師馬祖遣僧至問訊云住此山多少時開山云但見四山青又黃僧云得箇什麼道理便住此山開山云我在江西馬大師處得即心即佛之旨便住此山僧云近日馬大師佛法別了開山云如何別僧云非心非佛開山云任他非心非佛我自即心即佛僧回江西白馬大師大師云梅子熟也師云這僧用盡神力只圖轉換大梅殊不知被大梅不動絲毫和馬大師一時轉却上堂開口道著則千句萬句朝宗舉步踏著則千門萬戶俱到諸人道不著只被舌頭擬踏不著只被腳頭礙且道如何去却礙良久云露上堂深山巖崖石頭大底大小底小保福山中前岡後壠前溪後澗石頭大小諸人一見便知且道如何是佛法若也會去便見左之右之拍拍是令若也不會且被石頭礙塞元宵上堂節屆元宵氣象新笙歌競奏漢宮春滿城燈火喧和氣車馬往來人看人一處融通千處萬處重重無盡皆吾心印發光一處不透盡向燈影重顛倒擬欲眼睛定動古佛燈明過去久矣謝定慧上堂從上諸祖受用不盡一著子尋常未曾容易啓此緘封茲承定慧老叔祖尊臨盡情拈出供養去也卓拄杖云河出崑崙涅槃上堂四十九年蹲坐處無明荒草幾多愁一朝得意春風裏活却從前死路頭上堂黃檗棒頭馬祖喝下家家春風二三月處處緑楊堪繫馬拈拄杖云拄杖子同條生死不同條卓拄杖云錢是足陌物是定價清明上堂諸佛出世標拍荒郊達磨西來冢添新土保福今日向拜掃無門處打開一路卓拄杖云冬至寒食一百五三月旦上堂暮春初修禊事少長咸集群賢畢至數樹松花一溪流水知慚愧底足以暢敘幽情無摸索底正好頓張意氣莫有把手登崇山峻嶺者麼喝一喝云且緩緩佛生日上堂雨過前溪緑漲新拈拄杖云大梅杓柄轉精神復靠拄杖云放過一著且向佛殿裏各出隻手五月一上堂不見一法即如來是即名為觀自在又道不見一法為大過患以拂子擊禪床云山河大地一時擊碎了也設有向轉身吐氣處道得一句大梅山中猶有黃梅雨在喝一喝端午上堂不捨諸道法而現凡夫事竪起拂子云萬人遊仰處高挂錦標千波競起時要須好手不見道還如曾鬪快龍舟一度贏來方始休聖井請龍上堂乾坤把定稼穡焦熬拈拄杖云即今四大海水在諸人頂門上大身龍王在諸人眼睛裏卓拄杖云興雲吐霧為雨為霖其或不覺不知直須親到龍潭始得中夏上堂古者道行腳人十二時中也要管帶些子始得豈可只與麼隨行逐隊虗生浪死今夏九十日已過半了也諸人十二時中又作麼生喫粥喫飯行住坐臥還曾見得親切麼咄上堂佛祖説不到處道得一句綴骨粘皮行不到處進得一步撞墻撞壁未開口時道著未舉步時踏看荊棘參天葛藤遍地只為諸人不肯盡情放下拄杖子今日勸諸人放下去卓拄杖下座上堂動絃別曲落葉知秋普天匝地騎牛覔牛水潦和尚被馬師一踏便道識得百千三昧無量妙義根源於一毫頭直至如今笑不休上堂釋迦已去彌勒未生正當今日拄杖子向大梅峰頂與諸人舉揚自恣佛事卓拄杖云若到諸方不得錯舉謝首座維那上堂摩訶衍法離四句絶百非仰山居第二座所説之法且道第一座所説何法不具睦州指臨濟喫棒底眼目難以窺其涯涘若無興化打克賓罰錢出院底機用但知子承父業昧却源流諸人要知第一座所説法麼俱中秋上堂心月孤圓光吞萬像起模畫樣光非照境境亦非存收拾不上光境俱亡復是何物切忌向這裏蹲坐上堂得力句子全身擔荷水長船高泥多佛大西風鴈字新東籬菊花老四十九年談不到重陽上堂行路難有何難不見陶淵明採菊東籬下悠然見南山喝一喝云彼此丈夫莫受人瞞上堂多言喪道多歧亡羊渾無顆粒別甑炊香拍禪床云驚起暮天沙上鴈海門斜去兩三行天基節上堂一國之中聖主最尊四民之中君恩最重衲僧居四民之外正當今日如何報恩竪拂子云萬年松頂拂雲高佛成道上堂錯步入雪山茫茫謾尋討鬼眼忽撑開草窠裏蹲坐見底是明星悟底是什麼瞿曇瞿曇未敢相保因事上堂天寒人寒徹骨逈無依倚拳到踢到當機貴得崢嶸眼裏無筋韓獹逐塊皮下有血杓卜虗聲儻或不然有寒暑兮促君壽有鬼神兮妬君福上堂凍雲垂野掠地衝風乾坤把定凡聖潛蹤堪笑神光曾斷臂至今埋在雪堆中上堂向上機活人句石火電光葛藤露布靈蹤更在猿啼處上堂塵劫事只如今卓拄杖云向這裏瓦解氷銷如水入水似金博金未知年窮歲盡在何故三年一閏謝兩班上堂大無外細無內斗換星移明珠絶纇權實不到處賓主歷然時佛祖無門著眼窺上堂塵劫至今堂堂丈夫無毫髮許蓋覆得渠覔之轉失親之轉踈不論聖凡説甚賢愚直饒放下屠刀衲僧門下未敢相許七夕上堂分明見徹開口猶難驀過重關轉身無路只這拙處作麼生去竪拂子云不得有語不得無語擲下拂子云發機須是千鈞弩上堂履踐平實道路倚門傍戶敲磕嶮峻門庭接響承虗無師智自然智推倒大梅峰一舉九萬里保福緩緩向道伏惟安置脾寒上堂古者道學道人身心不猛烈工夫有間斷如隔日瘧相似每日寒一番熱一番驢年得絶後再蘇到大安樂田地山僧看來一日十二時無一人一時一刻向裏面捕能似發脾寒一番亦得何故正寒戰時揑定雙拳咬定牙關佛也不識正熱極時口中火發身如山重忽然大汗一回卓拄杖云也欠這一服藥不得上堂凡聖情盡進步竿頭只肯洛浦灌溪不肯德山臨濟且道獅子遊行一句作麼生道天寒歸堂向火慶元府香山孝慈真應禪寺語録參學編指三門云東開西閉滯在門庭左出右入重添途轍新香山有條活路與諸人共行去也喝一喝佛殿禮自己佛燒自己香容顏甚奇妙光明照十方拈帖從上佛祖盡向此大光明藏中發現且道此大光明從什麼處起塞却耳根分明聽取升座祝聖罷僧問談玄説妙畫餅充飢舉古論今蒸砂作飯去此二途如何通信師云白蘋紅蓼正秋風進云向這裏便知落處時如何師云潼關猶可度劒閣路難行進云如何是劒閣路師云無你著腳處進云記得百丈大智禪師參馬祖侍立次祖以目視禪床角拂子時如何師云與賊過梯進云百丈云即此用離此用師云一釣便上進云馬祖云你向後開兩片皮如何為人百丈取拂子竪起師云畫得真如活進云馬祖云即此用離此用百丈挂拂舊處師云相隨來也進云馬祖震威一喝直得三日耳聾師云頭正尾正僧禮拜師乃云向上一路帶水拖泥向下文長牽枝引蔓面前案山子時時生層雲時時動天籟不是心不是佛不是物以拂子劃一劃云若不得流水還應過別山舉適來禪客問百丈再參馬祖公案師云雷聲不迅怒不足以起蒼龍之勢機穽不深密不足以陷猛虎之暴汾陽云悟去便休説甚三日耳聾著語云稱尾尋星石門云若不三日耳聾何得悟去著語云斤中定兩且問諸人三日耳聾與悟去相去多少小參佛佛授受祖祖相傳穿衆穴於一毫握稱尺於掌內金翅擘海怒雷破山拈拄杖云我與你同條生不與你同條死登山須到頂入海須到底溟鵬九萬遼鶴三千須知海嶽歸明主未必乾坤陷吉人復舉黃山到夾山山問甚處人黃山云閩中人夾山云還識老僧麼黃云還識學人麼夾山云此事且止你還我草鞋價我却還你江陵米價黃山云江陵米作麼價夾山云真獅子兒善獅子吼師云黃山借便開門轉身無路夾山辨問詳審禮但周遮當時待問江陵米作麼價拈棒便打上堂坐深井者不知太虗之寬廣亡偏見者方知至理之圓融德山載疏鈔南來氣宇如王龍潭山中爇却則不問因甚見僧入門便棒人貧智短上堂舉洞山問青林近離甚處林云武林洞云武林法道何似此間林云胡地冬抽筍洞云別甑炊香供養林便出去洞山云此子向後走殺天下人去師云辨金別玉還他眼目精明青林直饒不受別甑炊香供養也遭他兩杓惡水重陽上堂老僧軒前黃菊花不可勝數如恆沙誰在畫樓沽酒處相邀來喫趙州茶臘八上堂雪山六載自欺瞞耿耿明星碧漢間開眼更無回避處普天匝地黑漫漫古今日月古今星辰竪拂子云還見麼良久云若教頻下淚滄海也須乾上堂舉九峯示衆云常住法身不生不滅僧便問既是不生不滅為什麼六道輪回峯云為有心故僧云以何方便當證法身峯云以虗空心合虗空理僧云證後如何峯云任從三界轉徒聽四生奔復云會麼僧云不會峯云禮拜著師云九峯大似會作楷法點畫一一分明及乎這僧道箇不會却又拈出草書雖然胸中無草書難看羲獻帖婺州雲黃山寶林禪寺語録侍者宗坦延輝編指三門云此大樓閣無住無去此樓閣門無開無閉作者同歸不勞彈指彌勒殿七佛前引維摩後隨但知逐隊隨邪腳跟何曾點地展坐具云看看蓋地蓋天流通去也拈帖一見便見一得永得當陽拈出雷動風行山門疏離四句絶百非聽取第一義諦指法座行到説不到漏雨漏風説到行不到撞墻撞壁行説俱到時如何向上有事在升座祝聖罷問答不録乃云擊門槌拊案尺遍界刀鏘參天荊棘與麼與麼爐鞴之所不與麼不與麼佛手難遮總不與麼時如何毗婆尸佛早留心直至如今不得妙舉雪竇明覺禪師示衆云山河無隔礙光明處處透傅大士騎驢入你鼻孔裏見諸人不惺惺却歸雙林寺去也便下座師云雪竇與麼説話要瞞諸人則易埋沒諸人則難何故出門見山水入門見佛殿上堂舉傅大士帶道冠儒履袈裟見梁武帝帝問云僧耶士指冠帝云道耶士指履帝云俗耶士指袈裟汾陽云大士多能五祖戒云傍觀者醜師云武帝高懸聖鑑要見緇素分明大士覿面當機且非索鹽奉馬檢點將來只知賣貴不知賣賤可惜武帝當時放過隨後好與一拶非僧非道非俗又指箇什麼管取口乾舌大上堂一不得向二不得討廊下間行堂中打坐眼裏耳裏觀世音胡達磨拍禪床云過結夏上堂握驪頷明珠秉金剛寶劒日日禁足安居箇箇心空及第猶是衲僧尋常行履雙林乍入院來不敢背俗違時下座且與諸人普同作禮善慧大士生日上堂悲願海四生海出沒卷舒圓融自在拈拄杖云善慧大士來也石火電光且過一邊擬欲擡眸龍華會裏靠拄杖下座上堂聖制禁足安居山僧月餘在外驀嶺沿山穿畦透陌才通大道又入深村要過那邊截流不顧雖然不遵聖制却有知音且道誰是知音南無心王菩薩上堂因堂中失賊半夜三更天昏地黑赤肉團邊捉得箇賊正好朝打三千暮打八百忽然向白拈手裏分贓時如何賊賊上堂舉傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處只這語聲是玄沙云大小傅大士只認得箇昭昭靈靈雪竇云玄沙也是打草驚蛇師云大士放行故是七穿八穴從汝針劄大士把住又向甚處著眼良久云且待下生中夏上堂天得中星辰羅地得中陰陽和衲僧得中罷却干戈隨寒逐暑徒自波波一夏九十日今日是中夏諸人未舉先和因甚問著如何是汝心却又不會拈拄杖云拄杖子到此也不得無過是汝諸人還知痛癢麼喝一喝上堂聖制安居處凡夫路不同拈拄杖云過去不可得現在不可得未來不可得掀翻毗盧樓閣只在頃刻天上無彌勒地下無彌勒上堂盡乾坤大地微塵諸佛向拄杖頭爭佛法覔勝負云雲門大師自啓封疆拄杖子與彌勒釋迦鬪打去也琅瑘和尚大似把主人公不定拈拄杖云這箇是拄杖子那箇是微塵諸佛彌勒釋迦卓拄杖云裂破八月旦上堂招手橫趍而過捧上安得成龍當陽吹起布毛錯認橘皮作火秋風一陳來落葉兩三片漿水錢草鞋錢迫不得已與諸人還了也西竺乾東震旦人人腳底長安道喝一喝上堂在有破有居空破空二幻既除中道不立衲僧家緊峭草鞋到這裏忽然轉身吐氣時如何到江吳地盡隔岸越山多上堂一切障礙即究竟覺山河大地日月星辰萬像森羅明暗色空有甚障礙處行住坐臥瞬目揚眉開單展鉢折旋俯仰有甚障礙處究竟又究竟箇甚麼覺又覺箇甚麼一切智智清淨無二無二分無別無斷故釋迦老子好與三十拄杖謝兩班上堂老木成喬林秋空見明月芥子之中入正定須彌山中從定出過去佛現在佛未來佛無物堪比倫教我如何説上堂靈龜未兆之際黑豆未芽已前道得一句蓋地蓋天猶未是無師句自然句秋風高秋空闊雪峰何曾桶底脫上堂無佛無衆生無古今拍禪床左邊云過這邊著無修無證無為拍禪床右邊云過這邊著竪拂子云會麼良久云渾崙擘不破與你兩文錢佛成道上堂天上星夜夜現眼豁開方始見黃面瞿曇腦後拔箭上堂諸佛及衆生皆承此恩力衲僧家拄杖頭帶了一升三合要行便行要坐便坐又承什麼恩力良久云喫粥喫飯上堂寒時寒殺熱時熱殺諸方普請寒暄雙林寒時熱殺熱時寒殺且非別換條貫何故大士從來頭戴冠上堂三界無安猶如火宅良醫之門愈多病人傅大士打失鼻孔眼睛至今尋討不見胡相公偏要向高高峰頂起殿不管鹽貴米賤春風一陳來花開三五片達磨大師挨拶不入忽携隻履返西天喝一喝上堂此方真教體清淨在音聞眼裏耳裏了沒交涉觀音菩薩三十拄杖貶向鐵圍那畔是真精進是名真法供養如來上堂一處通千處萬處絶羅籠青山常在知識難逢威音王已前猶是坐家致仕衲僧氣宇如王有何憑據良久云溈山笠子志公拄杖上堂觸境無滯舉目全乖田地穩密轉身無路且道遍恆河沙隱顯無間一句作麼生良久云住持事繁果然忘却上堂彌勒真彌勒拈拄杖云是真是假還有道得底麼如無莫道山僧瞞汝諸人去也以拄杖橫肩云天上無天下無上堂大海一漚未發已前以拂子劃一劃云坤六段乾三連擬欲眨眼驢年驢年佛涅槃并妙光菩薩生日上堂雙林樹下生雙林樹下滅生死不相關彼此是途轍雖然槨示雙趺則不問諸人且道妙光菩薩因甚姓劉喝一喝上堂正旦令晨物物咸新衲僧應時納祐不是和光同塵柏樹子麻三斤死柴頭上放陽春上堂一冬晴暖梅花盡開林下道人折得一蓓兩蓓但見清香可愛不知結調羹子未得何故猶有雪在上堂寂然不動感而遂通癩馬繫枯樁寂而常動不感而通四方八面絶羅籠不下禪床一喝耳聾不妨遊戲人事海中上堂一切聲是佛聲一切色是佛色三分光陰二早過普天匝地逐春忙辜負春光腸斷春光杏園啼百舌誰醉在花傍上堂橫按拄杖云久雨不妨農卓拄杖一下云春晴多賞玩不與法縛不求法脫不敬持戒不憎毀禁不重久習不輕初學是處井中有水誰家竈裏無煙雖然乍可移山不可改性擲下拄杖云又輥入泥水去也四月旦上堂不歷化城踏翻寶所猶是途路之樂是汝諸人拗折拄杖高挂鉢囊還端的也無須知三條椽下不是你諸人安身處長連床上不是你諸人喫粥喫飯處平地上不是你諸人經行處東司裏不是你諸人大小二事處拈拄杖云拄杖子不覺手舞足蹈出來道卓拄杖云安居近也上堂今古兩忘聖凡路絶猶在荊棘林中黃金殿上相逢者少地獄天堂隨處作主去也卓拄杖云高也著低也著端午上堂拈拄杖云是藥非藥信手拈來殺人活人風生八極任是文殊維摩卓拄杖云也少這一服不得善慧大士生日上堂兜率宮中把不定松山山裏借場開普天匝地皆泥水那更當生補處來莫有把定封疆者麼如無以拂子擊禪床云大士講經竟上堂拈拄杖云內視於心心無其心外視於形形無其形遠視於物物無其物雙林記得兒時上學忽一日調得四聲不覺歡喜便道我會也我會也且道致君澤民銘勳鼎相去多少解制上堂盡力道不得底句不在江南便在江北衲僧布袋頭開拄杖未拈草鞋未穿已遊遍四大部洲了也作麼生道得如無雙林自道去也以手作䇿眉勢云是多少上堂拈拄杖云若向這裏領略得去動靜一如彼此無間自能全動全靜全去全住其或不然拈動拄杖草鞋便是銀山鐵壁上堂頭頂天腳踏地聞鼓聲上來減多少意氣他殺不如自殺參他不如參己森羅萬像是汝諸人知識森羅萬像是汝諸人自己堪笑嵩山破竈墮既是泥土合成又要破也墮也作什麼拈拄杖卓云起開爐上堂金圈栗蓬爐鞴鎔鎔吞得透得鈍鐵頑銅百丈徒誇三日聾達磨忌上堂分皮分髓誑盲聾污却嵩山熊耳峰隻履携歸蔥嶺去賊身何處不相逢上堂透脫言詮鐵山橫臥截斷言詮通塗荒草良久云自小持齋今已老上堂二由一有一亦莫守一陽生也向脫窠臼絶羅籠處道將一句來上堂鶯老花殘春事已過明眼衲僧多是蹉過楝花信風不肯放過萬戶千門一時俱過築著磕著是誰之過轉換不得也要驗過拍禪床云過佛生日上堂杓柄人人入手來莫隨顛倒自沉埋普天匝地無回互黃面瞿曇出母胎便與麼去也少這一杓惡水不得卓拄杖一下下座上堂九日無白醪飽餐黃栗糕孤峰絶頂兩眼彌高不覺不知忽然帽落秋風惡秋風惡上堂碌碌復碌碌良馬白日足咬定牙關掀翻地軸神不敢呵鬼不敢哭世尊入地獄調達出地獄上堂惟一堅密身一切塵中現因什麼葉落方乃知秋人人皮下有血穿却鼻孔換却眼睛不覺不知喝一喝上堂一見便見何勞𧫡搭將軍不上便橋勇士不在挂甲又説甚寒山子水牯牛今日四明日八僧問巖頭路逢猛虎時如何拶謝兩班諸庫監收上堂建立諸法無諸法即是真如無上真如自然世出世間於法自在左天親右無著南天台北五臺厨庫僧堂三門佛殿竪四橫三玲瓏八面賓主交參同説是法梵音清雅令人樂聞風以時雨以時禾登場穀滿倉擊壤歌歌共樂無為拈拄杖云且道拄杖子又作麼生能為萬象主不逐四時雕謝匱頭副寺上堂入無窮出無盡把定要津頭正尾正且道以何為驗一二三四縱橫十字辭寶林赴平江府承天上堂萬里溪山一天明月拄杖頭邊無欠無餘無彼無此拈拄杖下座云還我東行西行平江府承天能仁禪寺語録侍者淨球智瑾編佛殿提起坐具云收則大地全收展則大千俱覆黃面瞿曇隱身無路踞方丈千聖頂𩕳打開三塗地底把住是汝諸人鼻孔總在山僧手裏卓拄杖云一時穿却省劄金剛圈栗棘蓬識得衲僧公驗便是造化爐中府疏赤水求珠猶是人間之寶和雲唱出故非格外玄談只這些兒如何領會不二門頭好生薦取山門疏前峨嵋峰後碧玉盤一字字一句句且非草本相瞞指法座坐斷毗盧頂不稟釋迦文喝一喝且在下風升座祝聖罷問答不録乃云水天空闊閙市門開南來北來拈却門前下馬臺千門萬戶總是如來經行處衲僧家莽莽鹵鹵無規無矩甜瓜徹蒂甜苦瓠連根苦畢竟如何良久云一忱拱北萬折朝東舉明覺赴雪竇到承天僧問祖意西來則不問北斗藏身事若何竇云拈頭作尾漢僧云請師答話竇云西天令嚴師云雪竇頭上錐腳下劄拍拍是令成就一切世界要識這僧麼葉公畫龍小參拈拄杖云全機大用毫髮不存臨濟一味驅奴德山一味使婢芭蕉全機與奪虗築防胡萬里城雲門忍俊不禁拋向雪峰大張口山僧無拒風力不敢效虎驟龍驤橫拈倒用自從遊歷以至近離雙林度嶺經沙東撑西拄全得渠力及過江來洗腳上船不動步而到此將謂拄杖子可以靠壁三通鼓罷大衆雲臻況言無味語無味法無味仍煩拄杖子打箇小座卓拄杖云雖然如是終有不滿意處何故薄禮致怨舉神鼎和尚開堂示衆云山僧行腳也無正因只待向東京城裏聽一本經論於古寺間房且恁麼過時不謂行到汝州被一陳業風吹上首山曲彔木床見箇老和尚當時把不住禮却他三拜直至如今悔不得師云神鼎開眼失腳落首山陷穽大似啞子喫苦瓜當時既禮他三拜又悔箇什麼山僧嘉定初亦無正因行腳一味江湖中打沒交涉太白峰前被箇老和尚於沒交涉處一拳打破乞兒窠窟直至如今轉沒交涉謝專使留兩班上堂彌勒兜率天宮所説之法乃至下生補處一一仍舊而説更無少異且道據箇什麼便乃如此拈拄杖云使乎使乎不辱命謝維那莊主道舊上堂興化打克賓種穀不生豆雖然費栽培也要人知有興化棒承天不是無不是不解拈出既遇山中人且説山中話雪下上堂直得動地雨花爭如歸堂向火雪竇大似閉門覔活盡乾坤大地把定無汝轉側處啞打破蔡州城了也上堂懸崖撒手藉草眠雲四方八面移南作北佛祖不歷處古今不到處如何行履三九二十七籬頭吹觱栗﨟八上堂開半夜眼見半夜星普天匝地誰不與麼黃面老瞿曇所成者何道參謝寮元上堂旃檀林獅子窟蹲坐不得處正好翻身片片煙消時方堪拈出不是心不是佛明眼衲僧莫輕忽上堂吳宮煙冷水迢迢當日齊腰雪未消臘月今朝二十五今朝未是拜年朝上堂歲之元月之元日之元元正啓祚萬彚發生達磨西來直指人心見性成佛一花開五葉結果自然成兩段不同收歸上科謝兩班上堂坐一走七橫三竪四大力量人全身擔負且道擔負箇什麼普化鈴鐸楊岐驢子元宵上堂自古及今燈燈相續匝地普天燈燈無間助發實相義今朝正月半上堂聞聲悟道左邊卓拄杖云觀音菩薩過這邊著見色明心右邊卓拄杖云文殊菩薩過這邊著不動步而登寶所中間卓拄杖普賢菩薩腳跟下好與一錐諸人要知承天落處麼搖頭説易當朝客落手圍棊對俗人天童卞山和尚遺書至上堂卷舒出沒生死海中石火莫及電光罔追承天手足情鍾今日重為卞山和尚灑此兩行淚與麼見得便知天下人不奈此老何涅槃上堂末上稱尊謾生跨赤土摩𮌎告衆抵死亞私商與麼生與麼死花鳥年年笑不休衲僧自有黃金骨靈隱茙藏主至上堂當年一曲脫空歌急水灘頭鳥作窠知是翻謄經幾手沒誵訛處有誵訛承天今日看來有甚誵訛處言言見諦句句朝宗南山起雲北山下雨總是破草鞋春寒料峭伏惟藏主尊候萬福上堂寒則普天寒熱則普天熱透出寒暑關何曾離窠窟因思熱則取涼寒燒榾柮無端被人喚作趙州古佛謝山藏主達維那上堂威音王已前無師自悟是第二句一大藏教詮注不及十聲槌下敲打不出顧視左右云第一句聻開且過上堂木落千巖秋空如洗向這裏轉得身去可以移星換斗轉位回機百尺竿頭纖塵不立向這裏進得一步殺活縱擒縱橫自在須彌無頂滄海無底靠拄杖云承天有茶有湯謝慧日上堂迦葉三昧阿難不知聞名見面劒去久矣拽擺拖犂較後先楊岐鼻孔沒半邊中秋上堂人人自有光明在看時不見暗昏昏拈拄杖云這箇豈不是光明敲香臺云一一聞見分明喚什麼作暗三年大比雕鶚橫秋橫按拄杖云且道是什麼題目喝一喝開爐上堂酸風刮地猛烈寒威火爐震動禪床震動未到火種全無若是衲衣單薄且請歸堂向火上堂却物為上逐物為下壁底籬根尋縫覔罅信腳踏翻大地平沉即虗空體證魔王身擲拄杖云元來却是南山鱉鼻上堂正月之吉始和諸福之物畢至衲僧家説甚畢至百草頭邊罷却干戈十字街頭縱橫遊戲鏡清智門佛法有無失利總是抱橋柱澡洗橫按拄杖云見麼江山行不盡春雨下無時上堂雲門一曲臘月二十五今朝是﨟月二十五諸人自謂衲僧門下客且道如何是雲門一曲若道不得拄杖子却為你諸人驚懼因甚如此﨟月三十日只在目前散天基節上堂天地發祥聖人誕降恩霑四海德被萬林下道人坐則禪板蒲團用則拄杖拂子無非仰答聖恩今日讚祝一句又作麼生此心心外更無心謝副寺莊主寮元上堂田庫兒甚奇怪一下鋤頭打破土塊盡大地老和尚髑髏粉碎坐一走七圓融內外青松下明窗內玉殿瓊樓未為最分毫定斤兩涓滴見滄海高聲云拄杖子話在靠拄杖下座元宵上堂三轉法輪於大千其輪本來常清淨平江出燈道地諸人盡知燈明如來在諸人眼裏耳裏轉如是輪因甚不知喝一喝上堂如是我聞遲日江山麗春風花草香諸佛出世眼瞎耳聾達磨西來眼瞎耳聾衲僧成團成塊眼瞎耳聾若是箇漢向黑豆未生已前信受奉行去三十年後方知且道知箇什麼眼瞎耳聾靈隱大川和尚遺書至上堂虗空迸綻山嶽起舞拔舌犂耕罪惡俱露拈拄杖云承天更與三十痛棒還知此棒落處麼不敢辜負我迦葉師兄上堂無邊剎境自他不隔於毫端十世古今始終不離於當念衲僧聞著便會舉著便知春風浩浩春日遲遲且道西天那蘭陀寺裏今日有幾人打失鼻孔若也不知香臺代汝喫棒去也以拄杖擊香臺一下下座妙峰會中道舊至并鑄鍋上堂妙高峰頂七日尋討不見忽向別峰把手大似生鐵鑄就成就不可説不可説香積世界佛事雖然行人更在青山外四月旦上堂鐵鞭指處陳雲橫腳力盡時山更好那更獅子返擲東西南北初無定止孟夏自孟夏衲僧因什麼盡向今日打住良久云爭怪得他謝秉拂夏齋慧感夫人生日上堂真靈無功功超造化真聖無相相包虗空從權攝化正按旁提風行草偃玉轉珠回使人人向這裏飽食味法味合掌云慚愧上堂買黑老婆巖頭三文自何而得空手來去老胡行止未明入水不動波入林不動草拈向一邊只如虎口裏奪餐驪頷下抉珠又作麼生官不容針保苗上堂驅耕夫之牛令他苗稼滋長奪飢人之食使箇箇飽地且道承天看經保苗是同是別若也道得便可證如意輪三昧海若道不得辜負承天半夏上堂看樓打樓東湧西沒入水入泥穿皮透骨十字街頭石敢當忽會轉身句便笑遼天鶻達磨大師眼睛突上堂大人境界佛祖説之莫窮文殊證之寂寂普賢證之重重無邊身菩薩到此無展神通處承天向閙市裏拋碌磚去也卓拄杖云一葉落天下秋謝兩班上堂無用之用其用甚大無功之功其功甚博自然如龍得水似虎靠山壺中春色異人間浙翁和尚忌拈香盡無邊虗空是徑山佛心禪師涅槃後相盡無邊虗空是承天法座作麼生安排作麼生供養承天今日淚出痛腸描畫虗空去也拈起香云還見麼澗聲山色裏一橛爛枯柴圓通中洲至上堂嗣無準爰從耳門圓照三昧緣心自在東倒西攂異中現同小中現大只如不涉眼色耳聲甚處與他相見婺機羅川紙會淨慈道舊至上堂伶俐衲僧討甚巴鼻著腳處寸草不生著眼時佛祖掃地且道以何為據不愛南山愛鱉鼻佛涅槃上堂毗籃園裏活中覔死不可得雙林樹下死中覔活不可得腦後一錐卓拄杖云是活是死靠拄杖下座上堂南州北州萬緒千頭釣絲絞水紙撚無油鶴神飛上天土宿騎黃牛大海有十件奇特事未曾説著海底蓬塵起千江水逆流維摩丈室有三萬二千獅子座彈指一下云收結夏上堂放下身心仁義禮智黃面瞿曇撈天摸地四月十五喚作結制東行不見西行利靈隱東谷和尚遺書至上堂正不立玄偏無所附三十年異類中行末後句月圓古渡且道東谷和尚還有來去也無夜船撥轉琉璃殿白鳥飛宿無影樹謝耆舊置田上堂實諸所無自己田地永失主宰空諸所有本來契券總屬當人寸土寸金一粒萬粒天牢神地牢神合掌讚嘆云南無為法檀度大菩薩摩訶薩謝淨慈首座并祈雨上堂膚寸生層雲已具瀰漫勢盡矚晴空目且非煙霧比首座行腳首座來也落在第二看看且道看箇什麼雲行雨至上堂孤峰頂上無出身路十字街頭亦無向背臨濟老瞎禿明州憨布袋正令不行東倒西攂諸人若不放過承天一著眉毛罅裏與諸人無相見分喝一喝結夏因事上堂以拂子擊禪床云前佛性命後佛紀綱一時打失了也長期百二十日且憑何而住竪拂子云有這箇在退院上堂平地起堆從古有青天霹靂避猶難杖頭自有通方眼風月一天非等間安吉州柏山崇恩資壽禪寺語録侍者編佛殿木骨金粧似則也似瞬目揚眉西天此土據室倒卓須彌揭翻大海魚龍變化禽鳥歡呼垂下一足云且放佛祖出頭府帖若論此事如王髻中珠不妄與人還是眼目精明方知來處府疏世俗諦中有真聖諦便是河目海口難盡宣揚提起疏云見麼大王來也指法座象王行處狐兔絶蹤水月現時風雲自異驟步云高著眼祝聖罷就座云四方洞達萬派朝宗一句截流羣機䆮削莫有識得鈎頭意者麼僧問插草以建梵剎賢于妙在當機宗王特建精藍和尚如何舉唱師云好生諦聽進云可謂驚群之句遇驚群人舉揚奇特之事遇奇特人拈出師云逢人但恁麼舉進云即今亦不少師云還我驚群句來進云如何是驚群句師云迅雷不及掩耳進云如何是奇特事師云是故此處最吉祥進云記得世尊於布髮掩泥處獻花燃燈是如何師云入水見長人進云燃燈指布髮處云此一方地宜建梵剎又作麼生師云鈎頭有餌進云時衆中有賢于長者持標於指處插云建梵剎已竟師云波騰嶽立進云時諸天散花讚云長者有大智慧師云讚嘆也讚嘆不及進云今日宗王建梵剎竟和尚又如何讚嘆師云虗空可量風可繫無能説此佛功德進云可謂今古應無墜分明在目前師云頂門具眼好生觀僧禮拜師乃云摩竭掩室毗耶杜詞依稀倣佛似箇衲僧門下及乎釋梵三請文殊讚善玉本無瑕雕文喪德誰知孤峯頂上不是安身墟市平田如何措足進一步踏他王公草地退一步亦是少父丘園當陽坐斷八面風生若是釋迦説不到處淨名彈擊不得處新柏山不是固其扃鐍謹其緘封拍禪床云王令已行舉波斯匿王問佛聖義諦中還有世俗諦否若言其無智不應二若言其有智不應一一二之義其義云何佛云大王於過去龍光佛法中曾問此義我今無説汝今無聽無説無聽是名一義二義師云波斯匿王具勘驗衲僧眼目要見玉石分明釋迦老子拈出木槵子要移換人不知自失一隻眼且道誵訛在什麼處小參大人具大見摩醯正眼竪亞頂門大智發大機於一毫端現寶王剎不與萬法為侶不與千聖同途一切殊勝事由此圓成無量三昧門由此建立全身擔荷地厚天高正令全提山遙水遠正與麼時如何如王寶劒隨王意似鏡當臺要絶觀舉南泉和尚入院知事頭首請歸方丈有僧便問師居方丈將何指示於人泉云昨夜三更失却牛天明起來失却火師云南泉透脫泥水逈絶蹊徑向威音那畔突出眼睛新柏山雖則不知韶濩韺䪫之奏元酒大羹之味也要著一隻眼南泉直饒道王老師不打這破鼓手中猶有釘空槌在留兩班請首座殿主上堂齊進退正紀綱提向上事建光明幢總屬諸人山僧無分何故見成公案上堂釋迦老子於波羅奈國梵王三請而轉法輪觀根逗教分別説三大似揑窠造偽瞞驀乎人柏山向纖塵不立處捩轉釋迦老子鼻孔去也長憶江南三月裏鷓鴣啼處百花香結制上堂大方無外大圓無內是凡是聖同此安居淈淈𣸩𣸩瞞瞞盰盰富不足而樂有餘是馬何曾喚作驢謝首座秉拂上堂舉一不得舉二放過一著掀翻圓覺伽藍突出衲僧巴鼻有利無利不離行市黃檗歸第二位坐南泉休去時如何陷虎機深猶深於海中夏上堂立中就中滲漏難盡不見一法始是半提向上全提諸佛諸祖明不出標不起龍女獻珠狼藉淨地還知柏山落處麼柏禪床一下云只有黃金無此間上堂三處度夏開拓封疆眉毛在麼抱贓叫屈柏山今夏一夏又作麼生良久云逢人不得錯舉浙翁和尚忌拈香三回四度不曾入得徑山門萬恨千愁今日落在弟子手插香云只得歡喜忍受謝新舊知客寮元上堂旃檀林無雜樹拈出片片皆香收來枝枝顯露門頭戶底一等打開時如何良久云喫茶去八月旦上堂是處是慈氏無門無善財古人為什麼三千里外賣却布單道不得超宗句草鞋三文錢買得中秋上堂一月普現一切水一切水月一月攝從上佛祖不出這影子只今雨暗乾坤拈拄杖云月明如晝衲僧眼目瞞他一點不得擲下拄杖云是什麼重陽謝大明楷率翁上堂柏山高秋風高打失登山屐吹落炙脂帽應節應不及登高登不到三十年前有人笑弄這般鼓笛豈知今日以虗空為鼓須彌為槌王老師道不打也只為蛇畫足諸人要識鹽官麼卓拄杖云大明生於東開爐上堂造化寒暑有來有往衲僧火爐有開有閉寒暑往來火爐開閉非實非虗非如非異拈拄杖云只今火爐開也三世諸佛六代祖師向這裏無親炙分是汝諸人看甚火色討甚冷暖火焰裏藏身淤泥中出現又是阿誰僧堂裏圍爐向火又是阿誰喝一喝下座上堂散為器者乃道之漓適於變者乃法之弊衲僧家如何是事事無礙底句良久云濟北老禿兵明州憨布袋天基節上堂一句子天長地久一句子日照月臨一句子風調雨順今晨將此三轉語效封人三呼之祝普與盡天地人同一鼓腹謳歌更有一句未到大佛殿先與諸人説破恭謝淨慈印首座上堂人天眼目渥窪真産踏殺天下人今古何曾間馬師不曾過去衲僧自生隔遠不隔遠蜀旱不旱蜀有彭漢正旦立春上堂依時及節歲歲元正啓祚拈拄杖云葭管灰飛勾芒布令卓拄杖云春牛頭黃歲稔年康上元謝副寺掌財上堂一燈明燈燈無盡燈即己有光非外來無內無外無東無西照長夜而不息如居大寶藏中取之無禁用之不竭與麼信得及與麼擔荷去時如何良久云南無燈明如來上堂我若東説西説你便尋言逐語藥多病多我若羚羊挂角你向甚處捫摸賊身全露放憨處鬼神莫測罅縫交輥時佛祖不奈伊何圓頓教中收歸上科柏山有不如人底句諸人要知麼屙屎進前放尿退後謝徑山琰藏主上堂衲僧相見或彼或此水出龍宮雲生嶽塢壁立千仞放行合水和泥把住仁義道中是第幾句卓拄杖云舉涅槃上堂雙林示滅誑何人無際真空淨法身活向春風裏埋了萬年千載不成塵上堂愛聖憎凡蝸牛上壁凡聖情盡獨鶴下田向外馳求鄉關轉遠百尺竿頭進得一步腳跟下正好一錐畢竟如何如是我聞一時佛在四月旦上堂罷拈金錫七尺軍前今春看又過何日是歸年辜負春山啼杜鵑樊將軍向補陀山上禮觀音大士不知不覺在五臺峨嵋見文殊普賢喝一喝佛生日上堂象駝紅日龍吐香水釋迦老子早遭染污了也説甚天上天下雲門氣宇如王未免見垛放箭柏山破木杓一滴渾無作麼生見得清淨法身雨過千山緑未休上堂寒時寒殺熱時熱殺洞山雖則打兔就窠不顧通身泥水茫茫普熱紛紛下雪雪竇遍界分身知恩者少薰風自南來殿閣生微涼似這般烏豆阿誰無一粒兩粒總過一邊著拈拄杖右邊諸人入得孟夏漸熱柏山別有管顧南劒州興化賢老通法嗣書上堂拗折探水杖不妨到處稱尊索得已喫棒方堪入這保社一信才通越南燕北只如純鋼打就時如何雙劒化龍上堂柏山小小叢林安居九十日五日不升堂隔日不入室與麼承當去已是拗曲作直吹粳著米無贓考賊沛公鬪智項羽鬪力南無甚深般若波羅蜜解制上堂護生殺生遍界刀鎗柏山結也如常解也如常如常恰似秋風至無意涼人人自涼咄開爐上堂草舍家風少富多貧牙根齧定七縱八橫有爐無火燒殺人有火無爐走殺人説甚楊岐鬼眼睛雲谷赴聖壽上堂黃檗歸本位坐陷虎機深保壽打推出僧釣鰲力巨一舉三山連未稱全提處把斷要津輝騰今古只如白雲道若是正法眼藏釋迦老子亦自無分且道具什麼眼目若無猿臂將軍手爭射林間金僕姑因事上堂人情濃厚道情微道用人情世豈知鹽鹹醋酸阿誰不知只要熟處放教生生處放教熟道用人情日久自然打成一片猶是蹲坐在淨地上要得大方獨步柏山與你草鞋上堂七日來復宮添一線衲僧分上作麼生石笋抽條氷河發焰拈拄杖云柏山拄杖子放一頭低與你相見卓拄杖云百雜碎天基節上堂天地發祥聖人應現如日麗天無物不照林下道人居照臨之下如何申祝南嶽萬年藤﨟八上堂雪山中夜半子眼見星醜惡露四十九年分疏不去兒孫千古遭塗污﨟八年年是一度上堂展則彌綸法界收則不立絲毫語默動靜礙心思意想礙喫粥喫飯礙屙屎放尿礙被阿修羅界收攝因甚不知一切智智清淨作福不如避罪喝一喝上堂不在內不在外不在中間無著力處熱鐵一團看看拄杖子轉身吐氣去也卓拄杖一下上堂識得一萬事畢把定乾坤照徹離微則且從如何是雲龍亨會底句卓拄杖云好生聽取上堂一棒一喝疾雷破山一提一唱崩空峭壁諸佛傍觀有分諸祖拈掇不出只如入已還閉又作麼生路遙知馬力事久見人心結制上堂安居禁足護生殺生無依倚處百匝千層拈拄杖云柏山手裏有烏藤閏月旦上堂不知月之大小不管歲之餘閏黑牛臥死水癩馬繫枯樁三年一閏五年載閏衲僧須經得與麼時節過方可成自己歲功且道憑何為據春寒秋熱臂疾上堂門掩衰頽又暮春這些病痛與誰陳百城若有歸來者方見文殊一臂伸上堂空空不住自溺自沉不重己靈撞墻撞壁未話具獅子向上爪牙便是三家村裏保正也要你做慧老出世竹林上堂透過祖師關佛法在掌握不經齊魯郊如何望岱嶽仁心普周被難與衲僧角換却鬼眼睛一著是一著柏山恁麼道猶是借水獻花畢竟如何義出豐年乃東嶽行宮嶽帝常過寺下碁上堂毗盧師法身主無纖毫蓋覆得渠亦不隔礙絲髮許慈悲喜捨何太苦不見老大隋云壞不壞隨他去上堂歸源性無二方便有多門棒如雨點喝似雷奔衲僧門下無著這破草鞋處經律論又向什麼科中收移高就下有箇商量良久云白晝長松風涼上堂火就燥水流濕問十答百問一答十達磨是甚老臊胡臨濟未是白拈賊以拄杖劃云今日為汝一劃劃斷且道既是冬瓜為什麼夏裏喫喝一喝上堂柏山一夏在病且無東説西話喚什麼作羹喚什麼作鼠糞免得鄰壁老宿咬齒控齦秋風嬴得兩眉橫中秋上堂秋氣澄清秋空如鏡萬籟沉寂明月一輪盡大地人徹曉競觀不知昧却自己光明所以道盡十方世界是沙門眼盡十方世界是自己光明盡十方世界在自己光明裏三世諸佛無量衆生皆是摩訶般若光光未發時無佛無衆生底消息山河國土甚處得來長沙岑和尚向諸人眼裏開張夜市見價不相當却來山僧拄杖頭上貴價精神賤價賣去也擲下拄杖云果然似箇大蟲上堂德山棒臨濟喝拗曲作直雲門餅趙州茶特地周遮威音那畔毫髮不差山中是處有黃花臨安府淨慈報恩光孝禪寺語録侍者志諶祖誾編踞方丈橫按拄杖云已是抑下威光了也盡大地若有一人不知痛癢我誓不成正覺拈勑黃君王之寶人人瞻仰有分提起云還見麼一點恩波天高地厚指法座象王回旋獅子返擲還他作者新淨慈年近老大一步是一步遂升座拈香云此一瓣香恭為今上皇帝祝延聖躬萬歲萬歲萬萬歲皇帝陛下恭願運天帝之神機應人王之寶曆化孚六合澤被含靈長懸日月之明永鎮乾坤之位趺坐問答不録乃云大機圓應一塵含剎海無邊大用無虧一句逗群機無礙南山蒼翠湘水瀰漫上祝一人聖壽如妙高不動之山等華藏甚深之海應指南詢門門解脫別峰相見水遠山長携手大毗盧樓閣中喝一喝云不得坐在這裏雖然明正為南方盡於南謝詞不録復舉僧問當山潛和尚如何是慧日祥光潛云此去報恩不遠僧云恁麼則蒙師照燭去也潛云且喜沒交涉師云潛和尚前頭照天照地後頭爍破面門可惜這僧倚門傍戶無承當分今日有人問新淨慈如何是慧日祥光只向他道山僧今日入院恁麼則蒙師照燭去也知恩方解報恩小參播揚大教還他大力量人明格外機須具通方眼目南山有條鱉鼻蛇汝等諸人切須好看雪峰雖則𮌎襟流出坐在荒草中長慶玄沙雲門知其屈伸擎頭戴角展髂蛇之手一著高一著未免為蛇畫足雪竇拈在乳峰前弄得却活也不離陳年方法南山淨地上不敢狼藉汝諸人腳跟下打併淨潔不妨東行西行其或未然觸著傷人毒無藥敘謝不録復舉臨濟侍德山次山云老僧今日困濟云寐語作麼山擬取拄杖濟掀倒禪床師云二大老龍驤虎驟雷動風行用在機先石火猶鈍雪竇云擬向飢鷹爪下分餐猛虎口中奪肉敢謂臨濟德山二俱瞎漢雪竇要向二大老面前橫行一步檢點將來也是贈金以黃追嚴徽宗皇帝上堂至尊至貴無去無來體若虗空逈絶安排報恩一句又作麼生須彌頂上擊金鐘上堂舉古德問僧何處來僧云雪峯來古德云我當時到彼事事不足而今足也未僧云足古德云粥足飯足僧無語師云古德當時到彼既道事事不足因甚勘證這僧却道粥足飯足古德可謂相魚拋餌非惟這僧不曾親到雪峯古德當時亦不曾到雪峰那裏見得事事不足上堂落賴門風無你趣向交輥得行昧却向上香嚴窮至無地無錐與馬大師自從胡亂後三十年不少鹽醬是同是別向這裏咬著舌頭知得鹽鹹醋酸拄杖子却向你道卓拄杖一下下座上堂即心是佛非心非佛東湧西沒穿皮透骨十字街頭孤峰絶頂是離窠臼不離窠臼咄上堂叢林聖制有解有結透脫重關紅爐點雪上堂三腳驢聖箭子放行則大地全收收來則千差一舉握土成金握金成土轉如是輪不可量數八月旦上堂南來北來上載下載且居門外上門上戶如卒風暴雨動便傾漱倒嶽入得淨慈門且過未有你著腳分還知淨慈落處麼自小持齋今已老不曾將草按牛頭上堂秋雲捲盡見晴空瘦聳西湖千萬峰水鳥樹林南宕寺老胡曾未到其中喝一喝出隊上堂貧到無錐正好進步王舍城中有條活路一聲金錫千門萬戶全放全收全賓全主多寶如來何曾過去上堂舉茱萸問僧云為復是遊山玩水僧為復是參禪問道僧僧云和尚試道看萸云雕鉗鏤蛤不糝之泥勞君遠至僧云通身是鐵也遭一撓萸云降將不斬師云辨龍蛇眼正擒虎兕機全收放自如則不無茱萸這僧真箇作得主未到弓折箭盡當時待他道雕蚶鏤蛤不糝之泥勞君遠至只向他道不妨具眼撩起便行不枉踏破遊州獵縣草鞋重陽上堂會則一似等間不會則千難萬難豈不見陶淵明採菊東籬下悠然見南山到這裏轉身有路不妨入廛垂手上堂明頭暗合絶安排莫厭紅塵撥不開不見當年分庵主一聲江上侍郎來上堂舉潭州三角印禪師示衆云凡説法須用應時應節時有僧問四黃四赤時如何印云三月杖頭挑僧云為甚麼滿肚貯氣印云爭奈一條繩何僧云如何得出氣去印云直待皮穿師云事理明白應時應節不得坐在這裏牙上生牙爪上生爪何曾離得這裏拍禪床右邊云三角和尚過這邊著還知淨慈落處麼天寒久立上堂將無作有較短為長土面灰頭半飢半飽且恁麼過若也煙霞路斷凡聖絶蹤彈指三下若向這裏進得一步待拄杖折却向汝道上堂謝北山道舊溪山雖異雲月是同透脫聲色任自西東十里西湖九里松上堂舉僧問九峰如何是道峰云可通車馬僧云如何是道中人峰便打僧禮拜峰便喝師云大衆九峰只要話行不知性命在這僧手裏上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界一法萬法若有若無以拄杖劃云一劃劃斷雖然今夜成見果子也要你會喫雪下上堂把定乾坤正此時衲僧猶未副全提普賢不顧彌天罪甘自渾身陷鐵圍南山據案結案更痛與三十棒諸人還知此棒落處麼瑞雪應期上堂言之者失其真知之者反其愚有之者乖其性無之者傷其軀俊鷹摩霄豈重雲能礙六馬奔騰豈朽索能繫如其不然轉身吐氣道將一句來良久云久雨不晴雲門道劄上堂信腳行信口道缺齒老胡不是達磨酸風刮地泥團凍破有什麼過喝一喝上堂謝兩堂首座秉拂新舊知事延壽堂主叢林得人如瑞雪應期相似蠲疫蕩瘵慶兆豐年可以坐享太平叢林得人荷負重任法等食等永絶飢虗有紀有綱如風吹水一動靜齊進退無中覔有粒粒全真東山暗號子楊岐鬼眼睛病起上堂通身是病通身藥病去依前藥自除木落秋空山骨露何須一默對文殊佛成道上堂夜半明星打失眼睛胡人多詐未可全憑遭他冤害始報不平且道如何報此不平提起坐具云少間大佛殿不可放過立春日上堂西天此土十萬餘程胡言易會漢語難明大洋海裏從渠競棹孤舟南山火冷灰寒糝花枯木別迎春色何須葭管灰飛動香在梅花第一枝上堂歇即菩提妙淨明心不從人得達磨大師向諸人眼裏大書特書上大人丘乙己諸人却向一因煙二人延處尋討自生違背即今要見達磨大師麼喝一喝上堂桃花水榆莢雨一點忽來千花競吐且道與曹溪流是同是別二祖不往西天達磨不來東土上堂三通鼓罷簇簇上來佛法人事一時周畢法眼與麼大似見密説甜不知鼓未鳴已前佛法人事何曾欠少便與麼承當得去買草鞋行腳三千里外穿却你鼻孔時如何虗空有盡上堂頭頂天腳踏地開口喫飯鼻孔出氣死盡活活盡死百尺竿頭更進一步未夢見衲僧巴鼻達磨迢迢西來蔥嶺迢迢歸去拄杖子因甚却在南山手裏卓拄杖云衆眼難瞞小參結夏小參過去已過去明朝是四月十五未來猶未來辜負多年破草鞋須知二千年已前北斗有柄二千年已後靈木無根三千里外撥動煙塵一彈指頃安家樂業太平無象王道無私於本分中山腰裏轉且道百二十日長期時如何雲藏巖竇窄雷出地聲高解夏小參七月十五已前住無所住而住帶角毒蛇橫古路七月十五已後去無所去而去獅子遊行無伴侶又誰管翠巖眉毛在不在又説甚萬里無寸草出門便是草一毫頭上如珠走盤拄杖頭邊風生八極到箇裏未是衲僧行履處如何是衲僧行履處除夜取涼六月下雪除夜小參一年將盡夜萬里未歸人愁人欲向愁人説未必愁人真箇愁楚天空闊稻梁多一念萬年休歇去大盡三十日小盡二十九路途之樂盡謂到家南北東西無可不可天上天下惟我獨尊歸去來歸去來若是明眼衲僧掩鼻而去雙林到此年窮歲盡更無絲毫許拈出烹北禪牛作東山家宴猶是倚門傍戶貧兒思舊債記得三十年前撥盡寒爐一夜灰成得一篇送窮年未免拈出與諸人分歲諸人好生聽取白首儒生困路歧殘杯冷炙飽還飢一朝得意春風裏便把驢兒作馬騎結夏小參行道峰頂蹤迹全無照影池邊毫髮不立古佛過去久矣彌勒説甚當來見面於一漚未發之前腦門上好與一劄縱步於經行之處腳跟下好與一錐怖影迷頭望雲無路劫石有銷日虗空無盡期看樓打樓買帽相頭九十日內作麼生見得形直影端聲和響順底句石上涼多新雨過池邊吟久好風生解夏小參全鋒敵勝罕遇知音同死同生萬中無一所以德山老漢平生一條脊梁硬似鐵未免向私商路上拗折却道若也於己無事則勿妄求妄求而得亦非得也汝但無事於心無心於事則虗而靈空而妙若毫端許言之本末皆為自欺雙林今夏安居若令箇箇無毫髮自欺者自然步步踏著實地於心契理真常山僧掇一座雲黃山作一碗羹供養上座且喜金圈栗棘實是此間土宜苟或未然九十日露柱燈籠欺汝諸人去也至節小參有物先天地無形本寂寥能為萬象主不逐四時雕拈拄杖云大士擊門槌多年黑似漆卓拄杖云君子道長寒時寒殺闍黎又卓拄杖云小人道消熱時熱殺闍黎萬里無雲青天正好喫棒三家村裏明陰洞陽十字街頭炭輕土重一任卜度且道如何是萬象主良久云只在此山中雲深不知處解夏小參九旬禁足網禽宿巢三月安居驅狐守冢向生殺不到處現三頭六臂掀翻圓覺伽藍猶是抱樁打泊浮雲黃山前雙檮樹下九十日內風以時雨以時二六時中少不添多不減一年三百六十日日日安居時時自恣圓者自圓方者自方長者自長短者自短未免淨地揚塵畢竟如何大鵬展翅天路遙巨鰲轉身海水窄至節小參諸佛出世足陌燒錢祖師西來高盤飣果以至地凍草枯水寒氷結臨濟走過新羅德山愁眉不悅盡是普請齋筵天地未判吉凶未兆已前全身簷荷高超三界獨步大方衲僧門下違時失候了也只如今夜三通鼓罷大衆雲臻坐立儼然時如何良久云湘潭雲盡暮山出巴蜀雪消春水來歲除小參年窮歲盡自合知時日往月來直須頂省東山大開家宴北禪烹露地牛若真箇是窮鬼子終不上這送窮船纖塵不動把定太歲咽喉撥亂七十二候直得臨濟德山灰飛火亂回避無門諸人還知承天落處麼一宵能幾刻兩歲要平分結夏小參九旬禁足虗築長城三月安居徒銷鋒鏑向上一路千聖不傳真獅子兒了無籠只如承天向十字街頭軟紅塵裏高叉手低鞠躬又作麼生無人知此意令我憶南泉解夏小參不虗度夏溈山苦口多甜再歸終夏黃檗瞎棒有餌與麼告報埋沒宗乘衲僧家灑灑落落一日兩粥一飯誰敢欠少殿前樹下乘涼闔閭城中應供直是威音那畔描也描不成聖制告圓諸人畢竟所成者何事飯籮邊多飢人龍門中多渴者解開布袋有箇商量初秋夏末千萬為拄杖草鞋保任若也東去西去上載下載無分不得錯怪承天好至節小參萬機不到地闢天開一句當堂山枯海竭搕𢶍堆中掘窖埋沒諸人氷河發焰石筍抽條何似洞庭霜後底諸人看著新年曆日不問陰極陽生但要知冬至在何朝冬果總少我一分不得承天今夜滿盤擎出還諸人了也且道何時欠諸人底來若也知得承天有沒量罪過若也不知卓拄杖云此去洞庭不遠結夏因事小參見聞覺知無障礙鐵山當路聲香味觸常三昧認奴作郎百尺竿頭進一步荒草連天退一步洪波浩渺無風起浪拗曲作直天堂未就地獄先成釋迦老子二千年前有約法三章以大圓覺為我伽藍身心安居平等性智欺胡瞞漢飢來喫飯困來打眠有甚不安居熱則普天熱寒則普天寒有甚不平等頭頂天腳踏地尅期取證證箇什麼那更鼓聲才動汝等諸人盡向這裏聚集少時錯且道承天錯諸人錯若也不知且在此過夏與你商量解夏少參毗盧樓閣八字打開圓覺伽藍十方通暢山中九十日佛法二千年青絹扇子足風涼説甚眉毛在不在是汝諸人還知慚愧也無若也不知還我九十日飯錢來至節小參運推移日南長至文不加點逈絶安排一得永得無變無遷伏羲未劃已前面目儼然諸佛出世之後醜拙俱露洞山果子浩老布裩總是祭鬼神盤飣印板打就和麩糶一任諸人摶量只如縮却項暗嗟吁又作麼生一冬二冬叉手當𮌎歲除小參歇即菩提妙淨明心不從人得雖是陳年曆日七十二候二十四氣一一分明只為當人信不及一向奔南走北尋東覔西逗到極歲窮年喝一喝云達磨在你腳底結夏小參當陽有路踏著方知覿面相呈著即瞎東西十萬南北八千塵埃不污玉靈鳳不羶天然氣槩向上眼明盡不可説不可説世界為自己不舉一念超越無邊剎土如是安居如是禁足衲僧門下未稱全提這邊那邊一時拈却拄杖子現隨類身去也卓拄杖云我此嶽塢雲遍滿大千界至節小參大通智勝佛作何形狀十劫坐道場轉身無路佛法不現前不為分外不得成佛道且與三十棒柏山已是向三門外揖客了也未言先領未舉先知過這邊著還須盡情放下如太虗空空亦不可得三世情盡如印印泥更無前後一塵不立要行便行要坐便坐撥著轉轆轆地觸著嗔斗㖃地有甚近傍處生死不能纏縛寒暑不可推遷雖然只今群陰剝盡一陽復生又作麼生喝一喝云天寒有妨久立歲除小參萬化不到枯樁生花燦發劫外春光化育一天和氣便見擊鼓逐除燒燈守歲頭頭顯露著著全超與麼告報應時應節輕易諸人何故只為有瞞諸人不得處非惟柏山瞞諸人不得從上諸佛諸祖天下老和尚亦瞞諸人不得那裏是瞞諸人不得處要知麼臘月三十日盡頭是歲除夜解夏小參九旬禁足法出姦生三月安居轉生荊棘火不待日而熱月不待風而涼眼因甚看眉毛不見進水無門出雲無路忽然如龍得水似虎靠山猶隔千里萬里解開布袋有箇商量西湖十里芰荷香至節小參天地未分陰陽未兆已前文彩全彰便與麼承當去猶是節後數九那更截群機於未兆藏冥運於即化與四時同一變遷與八節同一消長盡大地人茫茫蹉過不得打成一片未免效古人具辛禮于郟以迎長至去也卓拄杖云樂動黃鍾至節小參繁興大用舉即全真陰剝陽生道消道長有時撥亂二十四氣掀翻七十二候不與萬法為侶不與凡聖同途有時明陰洞陽有時橫三竪四從無住本本性圓明衲僧門下無非是念仲冬嚴寒日南長至通箇時暄敢問諸人黃河為甚連底凍喝一喝拈古舉溈山坐次仰山侍立溈云寂子近日宗門中令嗣作麼生仰云大有人疑著此事溈云寂子又作麼生仰云某甲祇管困來合眼健即坐禪所以未曾説著溈云到這田地也難得仰云據某甲見處著此一句語亦不得溈云為一人也不得仰云自古聖人盡皆如是溈云大有人笑汝與麼祗對仰云解笑某甲是某甲同參溈云出頭作麼生仰繞禪床一匝溈云裂破古今師云仰山俊跳處可謂父子不傳溈山控勒時直要子承父業仰山出得頭來因甚又在模子裏不見道賢賢易色舉溈山在方丈內臥見仰山入來溈乃轉面向裏臥仰云某甲是和尚弟子不用形迹溈作起勢仰便出去溈召云寂子仰乃回來溈云聽老僧説箇夢仰低頭作聽勢溈云為我原看仰取一盆水一條手巾來溈遂洗面了才坐香嚴入來溈云我適來與寂子作一上神通不同小小嚴云某甲在下面了了得知溈云子試道看嚴乃點一碗茶來溈歎云二子神通過於鶖子師云溈山放憨開眼合眼是夢二子太殺惺惺隨夢顛倒神通過於鶖子還免形迹也無拍禪床一下云休説夢舉溈山僧問如何是百丈真溈下禪床叉手又問如何是和尚真溈上禪床坐師云本來無位次何用強安排要識溈山麼孝當竭力舉高安白水仁禪師示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧作禮仁云且道為汝説答汝話若人辨得有箇入處師云水緑山青鴉鳴鵲噪本仁剛向遮裏販賣私商只貪低價相授爭奈官有明條驀拈拄杖靠却云放過一著舉天仙因新羅僧來參才展坐具仙捉住云未離本國時道取一句來僧無語仙便推出云問他一句便道兩句師云只知踏步向前不知笑破人口舉石樓因元康和尚來樓才見便收足坐康云得恁麼威儀周足樓云汝適來見箇什麼康云無端被人領過樓云是恁麼始為真見康云苦哉賺却幾人來樓便起身康云見即見已動即不動樓云盡力道不出定也康拊掌三下後有僧舉似南泉泉云天下人斷遮兩箇漢是非不得若斷得與他同參師云不遇盤根錯節不足以別利器不斷得天下人斷不得底是非不足以表大丈夫有大丈夫底出來斷看也要共知若斷不得寶林撿條去也卓拄杖云一串穿却舉貞溪禪師有僧來參溪豎起拂子云貞溪老漢還具眼麼僧云某甲不敢見人過溪云老僧死在闍梨手裏僧以手指𮌎便出溪云闍梨參見先師來至晚溪請喫茶次僧拈起盞云遮箇是諸佛出世邊事作麼生是未出世邊事溪以手撥却盞云到闍梨死在老僧手裏僧云五里牌在郭門外溪云無故惑亂師僧僧便起謝茶溪云特謝闍梨相訪師云自家屋裏人相逢便知屋裏事如鏡照鏡無毫髮可隱如水入水初無異味然則五里牌在郭門外阿誰不知若是佛未出世邊事更須參取曹山始得舉吉州性空禪師因僧來參人事了退空云與麼下去還有佛法道理也無僧云某甲結舌有分空云老僧又作麼生僧云素非好手空便仰身合掌僧亦合掌空却拊掌三下僧拂袖而出空云烏不前兔不後幾人於此茫然走祇有闍梨達本源結舌何曾著空有師云這僧拶著眼光射人無端依仁由義遭他描畫當時待仰身合掌拂袖便出直是首尾水灑不著只如達本源不著空有還有佛法道理也無喝一喝云不得忙然舉本生因僧從太原來生云近離那邊風景如何僧云與此間不別生云且道此間風景如何僧云和尚與某甲不同生云踏破施主草鞋當為何事僧無對生云即古即今出箇問處且難乃至老僧亦出不得師云識得那邊風景即是遮邊風景踏破施主草鞋即是自己草鞋是汝諸人要出箇問處不得住在此間不得離却此間舉祿青和尚因僧問不落道吾機請師道青云庭前紅莧樹生葉不生花僧無語青云會麼僧云不會青云正是道吾機為什麼不會僧作禮青便打云須是老僧打你始得僧又無語師云這僧既問不落道吾機因甚祿青却與道此正是道吾機啼得血流無用處不如緘口過殘春舉夾山一日瑞巖問與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道山云老僧謾闍梨去也巖喝云遮老和尚如今是什麼時節便出去有僧舉似巖頭頭云苦哉將我一枝佛法與麼流將去也師云瑞巖來如雨去似風暴且不知雲霧裏雷電巖頭與麼道不得無過家貧不知子苦舉夾山僧問如何是相似句山云荷葉團團團似鏡菱角尖尖尖似錐僧云不會山云風吹柳絮毛毬走雨打梨花蛺蝶飛師云語帶玄而無路舌頭談而不談不無夾山若是相似句更喫機橈始得舉福州古靈讚禪師問僧甚處來僧云城中來靈云還知所生父母在地獄中受苦麼僧云某甲特來看靈云你作麼生看僧云蒼天蒼天靈喝云遮裏是什麼所在要哭便哭僧云爭奈父母在地獄中受苦靈云作麼生免得此難僧云三十年後有明眼人鑒此話在師云古靈能開地獄不能閉地獄是以遮僧出入如同遊戲當時見遮僧道三十年後有明眼人即向道説甚三十年後拈棒便打趂舉丹霞見龐居士在面前立少時便出霞不顧士却入來與霞相對坐霞却向士前立少時便歸方丈士云你入我出未有事在霞云老老大大出出入入有甚了期士云略無些慈悲霞云引得箇老翁到遮田地士云把什麼引霞乃把住拈却幞頭云一似箇師僧士却將幞頭在霞頭上云一似箇俗人霞應喏喏士云猶有昔日氣息在霞拋下幞頭云恰似箇烏紗巾士應喏喏霞云昔日氣息爭得忘士彈指云動天動地師云坐立出入挨來拶去活鱍鱍地兩不相虧其奈氣息未除説甚驚天動地當時龐居士應喏喏便喝云這俗漢一推推出且教為幞頭作主舉則川一日在方丈內坐龐居士入來乃云祇知端居丈室不覺僧來參時川垂下一足士便出行三步却回川乃收足士云得恁麼自由自在川云爭奈我是主人何士云阿師祇知有主不知有客川喚侍者點茶士作舞而出師云主賓相稱應接酬酢皆中禮節居士出行三步而入賓禮不苟則川伸足垂足主禮亦盡若論我是主人豈容上門上戶要知末後一盞茶落處麼迎客不如送客舉大同一日問龐居士云是箇言語今古少人避得祇如居士還避得麼士云喏同再舉前話士云什麼處去來同云非但如今古人亦有此語士作舞而出同云風顛老風顛老自過教誰檢師云大同始終靠定不能拓開被居士向窠窟裏一錐自過教誰檢大似忍痛還拳當時見道向什麼處去來即與道千萬保重舉百靈一日在方丈內坐龐居士入來靈便把住云今人道古人道作麼生道士與一掌靈云不得道著士云道必有過靈云還我一掌來士便近前云你試下手看靈珍重出去師云居士一掌百靈珍重出去孰優孰劣若也道得與你一掌舉南陽忠國師因僧問如何是佛法大意國師云文殊堂裏萬菩薩僧云不會國師云大悲千手眼師云國師雖則鄉談難改大似頭上安頭僧云不會劈脊便棒舉長沙岑和尚僧問上上人來如何相見沙云如死人手僧云如何是上上人行履處沙云如死人眼師云可謂竹影掃階塵不動月穿潭底水無痕諸大老要拈出上上一著未免氣急殺人舉南泉一日上堂云文殊普賢昨夜三更起佛見法見各與二十拄杖貶向二鐵圍山去也趙州出衆云未審和尚棒教誰喫泉云王老師有什麼過州便禮拜師云南泉為衆竭力打開大道與人行趙州家國同憂直要絲毫不立承天不敢強生節目直情與諸人道淨地上不許狼藉舉韶山僧問如何是一切相山云烏飛霄漢白山遠色深青僧云恁麼則一切相去也山云我情知你亂會師云韶山前頭好片無瑕玉遮僧再進一問便見瑕生要知韶山麼不顧眉毛舉洛浦僧問無問無答請師答話浦云你不是丁姚僧云謝師答話浦云中九下七師云金入金師之手則無煅煉之失這僧索價不知精粗無星稱上定什麼斤兩舉同安察僧問學人未曉時機請師指示察云參差松竹煙凝薄重疊峯巒月上遲僧擬進語察云劒甲未施賊身已露僧云何也察云精陽不翦霜前竹水墨徒誇海上龍僧繞禪床一匝大笑而出察云閉目食蝸牛一場酸澀苦師云同安既知賊身已露因甚著賊不知閉目食蝸牛也是賊過後張弓舉德山鑒禪師有僧近前作相撲勢山云恁麼無禮合喫山僧手裏棒僧拂袖便出山云饒汝如是也祇得一半僧轉身便喝山便打云須是我打你始得僧云諸方有明眼人在山云天然有眼僧擘開眼云貓便出去山云黃河三千年一度清師云一向棒將去甚處討德山遮僧雖則汗馬功高不知被德山坐在這裏舉金峯一日拈起枕子云一切人喚作枕子金峯道不是僧云未審和尚喚作什麼峯拈起枕子僧云與麼則依而行之也峯云你喚作什麼僧云枕子峯云落在金峯窠裏師云要識金峯麼澄潭不許蒼龍臥舉巖頭因三聖來參頭云不用展炊巾遮裏無殘羹飯聖云設有向什麼處著頭便打聖接住棒推放床上頭拊掌一下聖將坐具蓋却頭哭蒼天而出師云勢均力等各有轉身活路在二大老分上正是殘羹飯因甚又如此狼藉干戈起處難捲旌旗法語示瑞侍者偃溪小師瑞上人夏雙徑來柏山求語即語之曰黃檗三頓棒歸宗一味禪此養子之方最甚者一言半句如生鐵橛無咬嚼處又其次者豈可婆言姐語金錢美食而事籠絡同日語耶爾師據北山為今代宗主生鐵門限綿褁稱槌不可淺近窺伺棄親就踈是資之背師也非師之罪也子歸父前無以父子情親可私其傳佛法非私也儻若獅子教兒赤壁之崖俊鷹巢於木末而自返擲奮飛則如破鏡之出窠臨機不見師方稱乃翁門閥示心傳二上人往太白具決定志必有決定眼目有決定眼目必能辨決定大事異時指四明叢林為衲子奔赴之海每冬後春首必留三四十單位以待遠方特來者杖不輕移足不輕措所以賣布單遠趨怡山而發轉新之笑於獨眼龍句下非具決定志何以至此決定志具決定眼正非間關也太白峯高二十里松不減異時摩穹勢雖曰樓閣門開不勞彈指更須知有入已還閉一關雖銀山鐵壁可透此關不可透作麼生透得此關決定志勇更不在柏山饒舌也示西禪淇上人昔踈山聞懶安有句無句之語即賣却布單不憚勞苦直造西寺直欲編辟其詞鋒不消懶安一笑踈山更奈何不得迢迢遙征憤憤氣宇於此時問道之心何如懶安非是緘封不密蓋憐其不能透一笑之關指獨眼龍為之點破一時雄據豈無其人惟指獨眼龍何耶以其具向上眼目識向上機用如駕萬鈞之弩在一發耳則靈鋒寶劒常露現前與露逈逈地豈有異耶被明招當機點破方知懶安笑裏有刀淇上人肄業西寺研足東西抑亦有所聞而參尋或慕大爐鞴而煅煉舍近取遠自相背馳石牛眠處荔子熟時參訪心渴入口便咽然一笑始信懶安而未嘗亡獨眼龍不在明招示祖上人達磨西來面壁九年而得二祖始對之無他語惟説久受勤苦乃可得成真醍醐毒藥立雪斷臂而獲安心又豈久受勤苦可到勇猛奮發在剎那間而入如來大寂滅海如臨濟之於黃檗棒下百丈之於馬祖喝下非臨濟不能承黃檗之棒非百丈不能當馬祖之喝方可振興鼻祖門戶遊州歷縣遇著眼目定動底便如獅子咬人火急定上座之見欽山直欲築殺這尿床鬼子使雪峯巖頭握拳透掌能擇本分宗匠本分叢林忘歲月寒暑勤苦立決定信非惟宗匠不辜學者亦自不負決擇眼目信若不決草鞋拄杖亦能欺人祖上人自徑塢來柏山求法語宜以前輩祖師為榜樣庶可遠到則使名實相副柏山與麼道也是為蛇畫足衲僧門下無佛無祖祖上人惺惺著偈頌天衣生緣烹金爐冷歲華更此地曾經借路行潮滿沙頭起寒鴈葛藤芽孽又重生拜明招塔稍硬風頭早已乖更歸暖處自沉埋翻令千古成蹤迹枉喫羅山白飯來水庵生緣一宿分明不易投老拳要覔死冤讎不應荒却娘生也自是無人敢出頭拜明教塔如説而行炳日星回瀾一柱屹亭亭湖邊安得磨崖石只刻尊僧篇作銘蘇溪牧護坐禪巖當機突出鴨吞螺奈此懸崖峭壁何等是蘇溪蹲坐處且非蒼檜影婆娑先羅漢塔風幡影裏眼麻迷為是知音却不知畢竟礙膺除未得寒松千古替傷悲佛迹石火電光中出沒崖崩石裂尚難酬放行一步還知不佛是西天老比丘布袋腳迹石上現名與長江萬古流當時狼藉若為收腳跟只為不點地又涴橋邊塊石頭韜光庵唐木猶存腹半空蒼崖苔是舊時封雲隨十乘歸伊洛月照年年湖上峯靈叟歸蜀半生清苦衲無畦惟有莎庭積雪知眼帶東南海色碧莫和煙雨看峩眉鄙翁住菁山庵糞火堆中不善藏蹲鴟直透九重香煙雲深鎖菁山塢輒莫鐘聲送夕陽鰲山接待到得安眠飽飯中東西南北路頭通三更夜半鬼嫁禍莫著巖頭與雪峯題譙菴譙令憲見松源歷觀嘉泰與開禧禪苑宗壇更有誰修竹蒼松凜寒色一如問道冷泉時惠山煎茶瓦瓶破曉汲清冷石鼎移來壞砌烹萬壑松風供一啜自籠雙袖水邊行靈隱得猿此心未歇最關情那更猿聲入夜頻從此飛來峯下寺又添多少斷腸人鑑維那歸蜀峨眉山月古關情流入渝江影倍清塵盡光生湖海客歸來還與月爭明與福上人聞名見面不須論枉到防風縣外村強半春光煙雨裏分明閉却柏山門贈壽上人覔諸方偈眼能乖不把炊巾亂展開知得一峯天下秀元從西竺國飛來送璲上人來從衡嶽畫圖間雙眼無非向上看放一頭低相見去方知玉几最高寒澓首座出世上雪竇老氣如虹久屈蟠把茅容易入深山長庚未話先腸斷冷債如今要得還送焦山淇上人見廣祐雲團廣祐盡愁城未必心肝鐵打成話著石公山下事定如猿呌第三聲送鴈宕慶藏主四十九盤飛鳥外衲衣猶帶宕雲寒豁開湖海煙波眼枯木石頭在鴈山珙上人求西風吹雨滿吳天不犯竿絲一釣船寂寞要貪香餌味江湖浮動幾蓑煙了翁先師公案強名模不解深藏負纍渠是我殺人便償命如何年老解心孤古鏡不知經幾劫塵侵元本形模莫辨明一片青銅銷得盡無揩磨處始光生夢宅六窗深閉大槐宮一枕清風瞬息中窮劫至今佛與祖樓頭知是幾聲鐘幻菴虗空迸裂海乾枯人在漚花影裏居合眼黃昏開眼晝月明何許上珊瑚瞎翁道得更無心外法首山有眼且無光拍盲枷棒揮將去匝地普天興禍殃古航片帆不是等間開衝破洪波白浪堆眨上眉毛千萬劫有誰洗腳上船來壽秀王八十道尊宗翰玉亭亭益固維城重典刑八十手扶靈壽杖咸瞻南極老人星隱室文殊親到見非親蹤迹渾無礙塞人一丈方方遮障了如何彈擊現全身讚佛祖出山相子夜逾城午夜見星青天白日大道不行水泥腳下轉深深究竟何曾得道成行道觀音盡聞不住業識忙忙空所空滅遍界難藏特地經行往那方獅子相觀音獅子國中隨類度生盤石海潮呵吼不停要見真獅子兒於斯觀其音聲魚籃觀音徒整春風兩鬢垂子規啼遍落花枝龍門上客家家是錦鯉携來賣與誰觀音十方圓明應現非一眼看淨瓶坐盤陀石楊枝入手時一滴是一滴踏蓮葉觀音剎海無數分身遍普蓮華葉上如日卓午應作如是觀圓通二十五布袋和尚三拖布囊握烏藤街頭市尾不是間行靠布袋作夢有甚惺惺處若遇當行家喚醒喫茶去一肩擔荷非輕是什麼破落索雖然顧後瞻前不知打失樓閣渡蘆達磨二江水無極莖蘆可折離了梁朝未到魏闕此恨波心向誰説破六宗邪開五葉花西天此土地無硃砂豐干跨猛處去來與寒拾來去賊火不勘自相訐露謂是彌陀有何憑據寒山五字忍飢吟十年忘歸路著不著大笑一場吐不出相似底句是真文殊無二文殊蘇盧㗭唎㗭唎蘇盧拾得來無地頭去有蹤迹笑不省是什麼意掃不盡幾多狼藉苦海無邊行願無邊喚作普賢即非普賢寒拾放帚坐對崖石看月放下苕帚對坐巖穴眼看不停口説不歇想得峨眉五臺無此一天明月船子和尚不是輕舟蕩漾戲一撓未展命如絲雙眸冏冏煙波外伶利闍梨欲到時郁山主拾得明珠笑口開謂言塵盡轉塵埃若無直下承當分孤負驢兒一攧來政黃牛江海歸來知幾年却從牛背看風煙十成一轉倒跟語萬象終難舉得全朝陽穿破衲二襤襂衣能多少破不盡補不了新羅夜半日輪紅線路何曾穿得透骨相寒毳寒衲不朝陽難提掇正與麼時大地火發對月了殘經二月在天字在紙於此經了也未口如鼻孔眼如眉依前坐在光影裏心洞明眼豁開末後句絶安排未曾展卷明月自來無準和尚奮身鐵色飛崖倒戈欠蹄少角得聵翁之聰而震忽雷乘雲巢之雲而撒巨雹遠若可親邇而愈邈拈死柴頭煨文武火而起龍宮之烈焰以廣長舌談真聖諦而被天子之恩渥或謂為密庵破庵跳籬驀𪤔之克家豈知是修水黃梅寒霜冷𦦨之超卓者也大歇和尚擔一字板喪却生涯見聵翁頂門有竅識祕魔手裏無叉霹𮦷震驚幾蟄龍蛇信手方圓了無痕瑕回垂天之雲翼念寶林之故家掃狐兔陸梁之區輕重輸經界之際俾檮陰永蔚稿面生霞若非鐵樹生花安能如是耶東坡難將得喪動天常儋耳安然似玉堂來往借書仍借笠不知雨步瘴煙鄉淵明田園稔久已荒蕪歸去來兮自荷鋤眼底悠然見無見黃花歲歲狀難如楊知府丹成於太初之先道濟乎後地之極負勳名閥閲之寄忘生長富貴之習時行時止無固無必操須彌之筆亦難寫此圭璋之質小佛事心監寺入塔了却心山嶽沉出生入死遊戲縱橫便與麼去時如何石函巖下骨千古不磨名定典座入塔定本無門從何而入放下笊籬木杓藏身了無蹤迹揚下骨云為有這些靈骨權上座火提起火把云有權有實有賓有主箇樣伶俐衲僧點著便知落處且道以何為據烈焰亘天紅無你棲泊處貫上座起龕兩箇五百元是一貫無端東覔西尋逗到冷泉亭畔爐鞴炎炎如何得入貫上座旗鼓動也潤維那入塔山腰石有千年潤井底泉無一日乾向這裏直下承當便見靈骨儼然錢是足陌潤維那磬聲斷後不得返悔凝知客火一片虗凝天花亂雨電光影裏送往迎來要且不知茶盞落處凝知客諾喫茶去廣老宿火生死海最廣深擬津濟遭漂沉一漚未發已前忽然火發時如何擲下火炬云開眼也著合眼也著宗南谷首座秉炬得處雖同用不同玄關向上振高風始終一節難移換生死去來遊戲中放行則易四海一律把住則難中流砥柱慣經惡拳踢於玉几芝峰分座提綱宗於湖山雙徑指出蔭涼大樹開鑿眼目人天雖然不入水牯群隊愈彰獅子威獰霜枯雪老夢破更殘末後全提電光石火眨得眼來古佛過去育王無住和尚起龕最初一步絶安排問著機鋒劈面來業債從茲遮不得向人平白起風雷佛慧得處佛照不知佛慧用處退谷不會出沒卷舒長行三昧六住名山無住而住大行此道不行而行拶到年窮歲盡驀然弩發千鈞凡聖不知蹤疑殺天下衲子虗空嚗地脫全彰玉几主人只今要見佛慧禪師移身則易要見佛慧禪師換步則難也不難也不易靈蹤不在猿啼處辭世頌云凡聖不知蹤虗空嚗地脫承天石山和尚入祖堂藥山大人相涅槃後有水灑不著描畫不就石山直下兒孫自是脫離窠臼轉位回機入廛垂手夜明簾外草芊芊琉璃殿上月皎皎只這是石山大人相死生來去不曾移還受安排也無呈起牌云題目分明
