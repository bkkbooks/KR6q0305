front:
  text: 介石禪師語錄介石在南山余甞一見之道貌充然出語警峭為其鄉人也愛之為其名輩也敬之寂久矣侍者晨景徹乃以此錄遠求著語余曰有句無句如藤倚樹橫說竪說如水漉月師既如此供通如此漏逗我又如何分雪雖然師甞七見浙翁末後因黃龍三關公案遂得浙翁一拳打失鼻孔有許㦬忉有許作略生平受用不盡又欲分付後人究竟果為誰底介石耶浙翁耶黃龍耶古人有云一字三寫焉烏成馬何況又有上石者又有下注脚者莫將黑豆換却眼睛則木馬嘶風泥牛入海去也咸淳戊辰閏正月十有五日竹溪齋林希逸書
